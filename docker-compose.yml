version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cfss-db
    environment:
      POSTGRES_USER: cfss_user
      POSTGRES_PASSWORD: cfss_password
      POSTGRES_DB: cfss_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
